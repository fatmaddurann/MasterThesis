services:
  - type: web
    name: visionsleuthai-backend
    runtime: python
    plan: free
    rootDir: visionsleuthai.v3/frontend/backend
    pythonVersion: "3.11.9"
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PORT
        value: 10000
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "masterthesis-zk81.onrender.com,visionsleuth-ai-backend.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.9"
      # GCP Configuration (for dataset storage)
      - key: GCP_BUCKET_NAME
        value: "crime-detection-data"
      # GCP_SERVICE_ACCOUNT_KEY should be set in Render Dashboard (not in YAML for security)
      # Get base64 encoded key: cat crime-detection-system-455511-6eb0681355fe.json | base64
      # Then add as environment variable in Render Dashboard

